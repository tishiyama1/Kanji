name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Synth infrastructure
        working-directory: infra
        run: |
          npm ci
          npx cdk synth --quiet
