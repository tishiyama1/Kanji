AWSTemplateFormatVersion: '2010-09-09'
Description: >
  GitHub Actions OIDC provider and deploy role for the Kanji app.
  The role can be assumed only by workflows in this GitHub repo, and it is
  allowed to assume the CDK bootstrap roles (cdk-*) to run `cdk deploy`.

Parameters:
  GitHubOrg:
    Type: String
    Default: tishiyama1
    Description: GitHub account/org that owns the repo
  GitHubRepo:
    Type: String
    Default: Kanji
    Description: Repository name (case-sensitive, as shown on GitHub)
  CreateOIDCProvider:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: >
      Leave 'true' the first time. Set 'false' if this account already has a
      GitHub OIDC provider (token.actions.githubusercontent.com).

Conditions:
  MakeOIDC: !Equals [!Ref CreateOIDCProvider, 'true']

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: MakeOIDC
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: kanji-github-deploy
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - MakeOIDC
                - !Ref GitHubOIDCProvider
                - !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub 'repo:${GitHubOrg}/${GitHubRepo}:*'
      Policies:
        - PolicyName: assume-cdk-roles
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/cdk-*'

Outputs:
  RoleArn:
    Description: Set this as the GitHub secret AWS_DEPLOY_ROLE_ARN
    Value: !GetAtt DeployRole.Arn
